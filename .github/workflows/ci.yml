name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l ./cmd ./internal ./pkg)
          if [ -n "$unformatted" ]; then
            echo "not gofmt'd:"; echo "$unformatted"; exit 1
          fi

      - run: go vet ./...

      # -race matters here: the generator's whole job is to be correct under
      # concurrency, and the tests hammer it from 16 goroutines.
      - run: go test -race -count=1 ./...

      - run: go build ./...

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      # Build for both release architectures, and do it here rather than only at
      # release time: a Dockerfile that cannot cross-compile to arm64 should fail
      # a pull request, not a tag push. Nothing is pushed — the build itself is
      # the assertion.
      - name: builds for amd64 and arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Then load the native one and actually run it. Building an image is not the
      # same as the image working: an entrypoint that exits, or a USER the runtime
      # rejects, both build perfectly happily.
      #
      # (buildx cannot --load a multi-platform image into the docker daemon, which
      # is why this is a second, single-platform build. It hits the cache above.)
      - name: the image starts and serves
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: snowid-server:ci
          build-args: VERSION=${{ github.sha }}
          cache-from: type=gha

      - name: it starts, and refuses a layout that would emit broken ids
        run: |
          docker run -d --name snowid snowid-server:ci --worker-id 0
          sleep 3
          docker logs snowid
          docker ps --filter name=snowid --filter status=running --format '{{.Names}}' \
            | grep -qx snowid || { echo "container is not running"; exit 1; }

          if docker run --rm snowid-server:ci --worker-id 0 --worker-bits 19; then
            echo "started with an overflowed timestamp layout; it should have refused"
            exit 1
          fi
