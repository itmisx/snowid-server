name: ci

# Only the tests, so that pushing is fast. Building the image takes a minute and
# tells you nothing `go build` did not — and release.yml builds it for both
# architectures and starts it before publishing anything, which is where a broken
# Dockerfile actually needs to be caught.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l ./cmd ./internal ./pkg)
          if [ -n "$unformatted" ]; then
            echo "not gofmt'd:"; echo "$unformatted"; exit 1
          fi

      - run: go vet ./...

      # -race matters here: the generator's whole job is to be correct under
      # concurrency, and the tests hammer it from 16 goroutines.
      - run: go test -race -count=1 ./...

      # The image is built with CGO_ENABLED=0 and cross-compiled to arm64, so check
      # here that it still can be. It costs seconds, and it is the one thing about
      # the release build that can break without a Go test noticing.
      - name: cross-compiles for the release architectures
        run: |
          set -euo pipefail
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch go build -trimpath \
              -o /dev/null ./cmd/snowid-server
            echo "ok: linux/$arch"
          done
