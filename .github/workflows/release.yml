name: release

# Publishes the multi-arch image to GHCR and cuts a GitHub Release.
#
#   git tag v0.1.0 && git push origin v0.1.0
#     -> ghcr.io/<owner>/snowid-server:v0.1.0 and :0.1.0 (plus :0.1, :0, :latest), amd64 + arm64
#     -> a GitHub Release with binaries for linux and macOS
#
# Tags only. An ordinary push to main builds nothing: a multi-arch build takes a
# minute, and paying it on every commit buys nothing you do not already get from
# `go test`. Use workflow_dispatch to rehearse this against a branch.
#
# Uses the built-in GITHUB_TOKEN — no secrets to configure for same-repo GHCR.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # QEMU is not used to compile — the Dockerfile cross-compiles, see there —
      # but buildx wants the emulators registered to assemble the arm64 layers.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Both spellings, because there is no one convention and a tag costs nothing:
      # it is a pointer to a digest that is already there.
      #
      #   git tag v0.1.0  ->  :0.1.0 :0.1 :0      Docker's own (golang:1.26.5)
      #                       :v0.1.0 :v0.1 :v0   Kubernetes' (prometheus:v2.20.0)
      #                       :latest
      #
      # metadata-action's {{version}} STRIPS the v, because semver says the v is not
      # part of the version. On its own that means `git tag v0.1.0` publishes an
      # image called `0.1.0` — the git tag and the image tag never match, and a
      # manifest pinning `:v0.1.0` pins a tag that does not exist. Publishing both
      # ends the question.
      #
      # :latest is for `docker run` and nothing else. Do not put it in a manifest:
      # two replicas pulling it at different times can end up on different binaries,
      # and the id layout is permanent — every replica must agree on it forever.
      # deploy/k8s pins a version tag on purpose.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # workflow_dispatch from a branch has no semver to derive, so give it a
            # name of its own rather than letting it land on :latest.
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Building an image is not the same as the image working: the USER bug this
      # Dockerfile once had built perfectly and could never start a container.
      #
      # Deliberately plain. No --platform (it cannot be combined with a digest —
      # moby/moby#43188), no digest, no QEMU: just pull the tag we pushed and run it
      # on the runner's own architecture. The Dockerfile is identical for both
      # arches, so what this catches, it catches for both.
      - name: the published image starts, and refuses a bad layout
        env:
          REF: ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          echo "smoke-testing $REF"

          docker run -d --name smoke "$REF" --worker-id 0
          sleep 5
          docker logs smoke
          docker ps --filter name=smoke --filter status=running --format '{{.Names}}' \
            | grep -qx smoke || { echo "the container is not running"; exit 1; }

          if docker run --rm "$REF" --worker-id 0 --worker-bits 19; then
            echo "started with an overflowed timestamp layout; it should have refused"
            exit 1
          fi

      - name: summary
        run: |
          {
            echo "### Published"
            echo
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "Platforms: \`linux/amd64\`, \`linux/arm64\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # Tags only. Deliberately independent of the image job: a flaky registry should
  # not cost you the Release, and a Release without an image is easy to see and fix.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # release notes are generated by diffing against the last tag
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Not everyone runs containers. Ship the binary too — one static file, no libc
      # to match, which is the whole reason CGO_ENABLED=0 is worth it.
      - name: build the binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os=${target%/*} arch=${target#*/}
            name="snowid-server_${VERSION}_${os}_${arch}"

            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "dist/${name}/snowid-server" ./cmd/snowid-server

            cp LICENSE README.md "dist/${name}/"
            tar -C dist -czf "dist/${name}.tar.gz" "$name"
            rm -rf "dist/${name:?}"
          done

          cd dist && sha256sum ./*.tar.gz > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          body: |
            ## Container image

            ```console
            docker pull ${{ env.IMAGE }}:${{ github.ref_name }}
            ```

            Built for `linux/amd64` and `linux/arm64`.
