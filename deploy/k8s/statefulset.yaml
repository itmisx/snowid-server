# A StatefulSet, and each pod gets its worker id from its own ordinal.
#
# Two live processes sharing an identity issue the same ids, so the worker id is
# the one thing that must never be guessed. This manifest does not guess: it reads
# the ordinal straight out of the label the StatefulSet controller stamps on each
# pod.
#
#   snowid-0 -> apps.kubernetes.io/pod-index: "0" -> SNOWID_WORKER_ID=0
#   snowid-1 -> apps.kubernetes.io/pod-index: "1" -> SNOWID_WORKER_ID=1
#
# Kubernetes guarantees at most one pod holds a given ordinal at any moment — a
# rolling update terminates snowid-0 before recreating it, never overlapping — so
# the id is unique and stable across restarts with no external coordination.
#
# Run this same spec as a DEPLOYMENT and it fails closed, on purpose: a Deployment
# sets no pod-index label, the downward API yields "", and the server refuses to
# start rather than invent a worker id. That is the correct outcome.
#
# Requires Kubernetes 1.28+ for the pod-index label (beta and on by default there,
# GA in 1.32). On older clusters, set --worker-id yourself — one StatefulSet per id.
#
# The 10 node bits below are split 5/5, so this manifest allows 32 datacenters of
# 32 replicas each. One replica already serves 4,096,000 ids/second, so replicas
# are about resilience, not throughput — 32 is not a ceiling you will feel.
apiVersion: v1
kind: Service
metadata:
  name: snowid
spec:
  # Headless: DNS resolves to the pod IPs, so gRPC clients can round-robin across
  # replicas and drop a failed one on their own.
  clusterIP: None
  selector:
    app: snowid
  ports:
    - name: grpc
      port: 50052
      targetPort: grpc
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: snowid
spec:
  serviceName: snowid
  replicas: 3
  selector:
    matchLabels:
      app: snowid
  # Pods keep their identity across a rolling update: snowid-1 is terminated and
  # recreated as snowid-1, so no two live pods ever hold the same worker id.
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: snowid
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: snowid
          # Pin a tag or digest. :latest lets two replicas run different binaries,
          # and the id layout is permanent — they must agree on it forever.
          image: ghcr.io/itmisx/snowid-server:v0.0.5
          args:
            # THE LAYOUT. Every one of these is PERMANENT: each id you have ever
            # issued is decoded relative to them, so changing one afterwards makes
            # every existing id decode to the wrong time and the wrong origin.
            # Settle them before the first id, and never touch them again.
            #
            #   | unused(1) | timestamp(41) | datacenter(5) | worker(5) | step(12) |
            #                                 \_____ node segment (10) _____/
            #
            # node-bits + step-bits may not exceed 22 — that is snowflake's whole
            # budget for the two, and the timestamp gets the rest (41 bits here,
            # about 69 years). The server refuses to start if you go over.
            - --epoch=1727712000000 # 2024-10-01T00:00:00+08:00
            - --node-bits=10 # the whole node segment: 1024 identities
            - --step-bits=12 # 4096 ids per millisecond per worker
            # The datacenter takes the top 5 of the node segment's 10 bits, so the
            # worker is left 5: 32 datacenters of 32 replicas. Worker width is
            # derived, never configured, so a split cannot fail to add up — and 5
            # worker bits do cap this StatefulSet at 32 replicas, since pod 32 would
            # not fit its segment and the server refuses to start rather than wrap
            # onto pod 0's identity.
            - --datacenter-bits=5
            #
            # Which datacenter THIS cluster is. One value for the whole StatefulSet —
            # every replica shares the datacenter and differs only in worker id — so
            # it is a plain flag, not an env var.
            #
            # REQUIRED, because --datacenter-bits is set: the server will not start
            # without it. There is no default, on purpose. A default of 0 is a default
            # IDENTITY, and the way you get duplicate ids is by copying this file to a
            # second cluster and changing nothing — so the second cluster has to say
            # --datacenter-id=1 out loud.
            - --datacenter-id=0
          env:
            # THE WHOLE POINT, and the one value a flag cannot carry: it differs per
            # pod. The StatefulSet controller sets this label to the pod's ordinal;
            # nothing else does. No hostname parsing, no guessing.
            - name: SNOWID_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
          ports:
            - name: grpc
              containerPort: 50052
          readinessProbe:
            grpc:
              port: 50052
            periodSeconds: 5
          livenessProbe:
            grpc:
              port: 50052
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
            # Required by the "restricted" Pod Security Standard; without it the
            # pod is rejected at admission in such a namespace.
            seccompProfile:
              type: RuntimeDefault
